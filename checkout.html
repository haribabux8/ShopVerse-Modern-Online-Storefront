<!doctype html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Checkout — ShopVerse</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body data-page="cart"><div class="page-loader"><div class="spinner"></div></div><header class="site-header"></header><main><section class="page-header"><div class="container"><div class="breadcrumbs"><a href="index.html">Home</a> / <a href="cart.html">Cart</a> / Checkout</div><h1>Checkout</h1></div></section><section style="padding-top:16px"><div class="container"><form id="checkout-form" novalidate><div class="checkout-layout"><div><div class="form-card"><h3>Customer Information</h3><div class="form-grid"><div class="field"><label for="firstName">First name</label> <input id="firstName" name="firstName" type="text" data-rules="required" placeholder="Jane" required> <span class="error-msg"></span></div><div class="field"><label for="lastName">Last name</label> <input id="lastName" name="lastName" type="text" data-rules="required" placeholder="Doe" required> <span class="error-msg"></span></div><div class="field"><label for="email">Email</label> <input id="email" name="email" type="email" data-rules="required,email" placeholder="jane@example.com" required> <span class="error-msg"></span></div><div class="field"><label for="phone">Phone</label> <input id="phone" name="phone" type="tel" data-rules="required,phone" placeholder="+1 555 000 1234" required> <span class="error-msg"></span></div></div></div><div class="form-card"><h3>Shipping Address</h3><div class="form-grid"><div class="field full"><label for="address">Street address</label> <input id="address" name="address" type="text" data-rules="required" placeholder="123 Main St, Apt 4B" required> <span class="error-msg"></span></div><div class="field"><label for="city">City</label> <input id="city" name="city" type="text" data-rules="required" placeholder="New York" required> <span class="error-msg"></span></div><div class="field"><label for="zip">Postal code</label> <input id="zip" name="zip" type="text" data-rules="required,zip" placeholder="10001" required> <span class="error-msg"></span></div><div class="field"><label for="country">Country</label> <select id="country" name="country" data-rules="required" required><option value="">Select…</option><option>United States</option><option>Canada</option><option>United Kingdom</option><option>Australia</option><option>Germany</option><option>India</option><option>Other</option></select> <span class="error-msg"></span></div><div class="field"><label for="state">State / Region</label> <input id="state" name="state" type="text" data-rules="required" placeholder="NY" required> <span class="error-msg"></span></div></div></div><div class="form-card"><h3>Payment Method</h3><div class="payment-options"><label class="payment-option selected"><input type="radio" name="payment" value="card" checked="checked"> Credit / Debit Card</label> <label class="payment-option"><input type="radio" name="payment" value="paypal"> PayPal</label> <label class="payment-option"><input type="radio" name="payment" value="cod"> Cash on Delivery</label></div><div id="card-fields" class="form-grid" style="margin-top:18px"><div class="field full"><label for="card">Card number</label> <input id="card" name="card" type="text" inputmode="numeric" data-rules="required,card" placeholder="1234 5678 9012 3456"> <span class="error-msg"></span></div><div class="field"><label for="expiry">Expiry</label> <input id="expiry" name="expiry" type="text" data-rules="required,expiry" placeholder="MM/YY"> <span class="error-msg"></span></div><div class="field"><label for="cvv">CVV</label> <input id="cvv" name="cvv" type="text" inputmode="numeric" data-rules="required,cvv" placeholder="123"> <span class="error-msg"></span></div></div></div></div><aside class="summary" id="checkout-summary"></aside></div><div style="margin-top:16px"><button type="submit" class="btn btn-primary" style="min-width:200px">Place Order</button></div></form></div></section></main><footer class="site-footer"></footer><script src="js/products.js"></script><script src="js/app.js"></script><script src="js/checkout.js"></script></body></html>
