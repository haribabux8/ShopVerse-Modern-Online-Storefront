<!doctype html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign In — ShopVerse</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body data-page="login"><div class="page-loader"><div class="spinner"></div></div><header class="site-header"></header><main><div class="auth-wrap"><div class="auth-card fade-in"><div class="auth-tabs"><button class="active" data-tab="login">Sign in</button> <button data-tab="register">Create account</button></div><form id="login-form" class="auth-form" novalidate><h2>Welcome back</h2><p class="muted">Sign in to continue shopping with ShopVerse.</p><div class="field"><label for="login-email">Email</label> <input id="login-email" type="email" data-rules="required,email" placeholder="you@example.com"> <span class="error-msg"></span></div><div class="field"><label for="login-pass">Password</label><div class="password-field"><input id="login-pass" type="password" data-rules="required" placeholder="Enter your password"> <button type="button" class="toggle-pass" data-toggle="login-pass" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div><span class="error-msg"></span></div><div class="auth-meta"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox"> Remember me</label> <a href="#">Forgot password?</a></div><button type="submit" class="btn btn-primary btn-block">Sign In</button><div class="divider">or continue with</div><div style="display:flex;gap:8px"><button type="button" class="btn btn-secondary btn-block">Google</button> <button type="button" class="btn btn-secondary btn-block">Facebook</button></div></form><form id="register-form" class="auth-form hidden" novalidate><h2>Create your account</h2><p class="muted">Join ShopVerse and get 10% off your first order.</p><div class="field"><label for="reg-name">Full name</label> <input id="reg-name" type="text" data-rules="required" placeholder="Jane Doe"> <span class="error-msg"></span></div><div class="field"><label for="reg-email">Email</label> <input id="reg-email" type="email" data-rules="required,email" placeholder="you@example.com"> <span class="error-msg"></span></div><div class="field"><label for="reg-pass">Password</label><div class="password-field"><input id="reg-pass" type="password" data-rules="required" placeholder="At least 8 characters"> <button type="button" class="toggle-pass" data-toggle="reg-pass" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div><span class="error-msg"></span></div><div class="field"><label for="reg-pass2">Confirm password</label><div class="password-field"><input id="reg-pass2" type="password" data-rules="required" placeholder="Re-enter password"> <button type="button" class="toggle-pass" data-toggle="reg-pass2" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg></button></div><span class="error-msg"></span></div><label style="display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--color-text-muted)"><input type="checkbox" required> I agree to the <a href="#" style="color:var(--color-primary)">Terms &amp; Privacy Policy</a></label> <button type="submit" class="btn btn-primary btn-block">Create Account</button></form></div></div></main><footer class="site-footer"></footer><script src="js/products.js"></script><script src="js/app.js"></script><script>document.addEventListener("DOMContentLoaded",()=>{const tabs=document.querySelectorAll(".auth-tabs button");const loginForm=document.getElementById("login-form");const regForm=document.getElementById("register-form");tabs.forEach(btn=>btn.addEventListener("click",()=>{tabs.forEach(b=>b.classList.remove("active"));btn.classList.add("active");const tab=btn.dataset.tab;loginForm.classList.toggle("hidden",tab!=="login");regForm.classList.toggle("hidden",tab!=="register")}));document.querySelectorAll(".toggle-pass").forEach(btn=>{btn.addEventListener("click",()=>{const input=document.getElementById(btn.dataset.toggle);if(!input)return;input.type=input.type==="password"?"text":"password"})});const rules={required:v=>v.trim()!==""||"This field is required",email:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)||"Enter a valid email"};function validate(form){let ok=true;form.querySelectorAll("[data-rules]").forEach(inp=>{const r=inp.dataset.rules.split(",").map(s=>s.trim());const wrap=inp.closest(".field");const err=wrap.querySelector(".error-msg");let msg="";for(const k of r){const res=rules[k]?.(inp.value);if(res!==true){msg=res;break}}if(inp.id==="reg-pass"&&inp.value.length<8&&inp.value.length>0)msg=msg||"Password must be at least 8 characters";wrap.classList.toggle("invalid",!!msg);err.textContent=msg||"";if(msg)ok=false});return ok}loginForm.addEventListener("submit",e=>{e.preventDefault();if(!validate(loginForm))return showToast("Please correct the errors","error");showToast("Signed in successfully ✓","success");setTimeout(()=>location.href="index.html",800)});regForm.addEventListener("submit",e=>{e.preventDefault();if(!validate(regForm))return showToast("Please correct the errors","error");if(document.getElementById("reg-pass").value!==document.getElementById("reg-pass2").value){const w=document.getElementById("reg-pass2").closest(".field");w.classList.add("invalid");w.querySelector(".error-msg").textContent="Passwords don't match";return showToast("Passwords don't match","error")}showToast("Account created! Welcome 🎉","success");setTimeout(()=>location.href="index.html",900)})})</script></body></html>
