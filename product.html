<!doctype html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product — ShopVerse</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body data-page="products"><div class="page-loader"><div class="spinner"></div></div><header class="site-header"></header><main><section class="page-header"><div class="container"><div class="breadcrumbs" id="breadcrumbs"><a href="index.html">Home</a> / <a href="products.html">Shop</a> / <span id="bc-name">Product</span></div></div></section><section style="padding-top:16px"><div class="container"><div id="product-root"></div></div></section><section style="background:var(--color-surface-2)"><div class="container"><div class="section-head"><h2><small>You may also like</small>Related Products</h2></div><div class="product-grid" id="related-grid"></div></div></section></main><footer class="site-footer"></footer><script src="js/products.js"></script><script src="js/app.js"></script><script>document.addEventListener("DOMContentLoaded",()=>{const params=new URLSearchParams(location.search);const id=Number(params.get("id"))||PRODUCTS[0].id;const p=findProduct(id);const root=document.getElementById("product-root");if(!p){root.innerHTML=`<div class="empty-state"><h3>Product not found</h3>\n          <a class="btn btn-primary" href="products.html" style="margin-top:14px;">Browse shop</a></div>`;return}document.title=`${p.name} — ShopVerse`;document.getElementById("bc-name").textContent=p.name;const gallery=[p.image,p.image.replace(/%23[0-9a-fA-F]{6}/g,(m,i)=>i%2?m:"%23"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0")),p.image,p.image];const disc=discountPct(p.price,p.oldPrice);const specRows=Object.entries(p.specs).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");root.innerHTML=`\n        <div class="product-detail">\n          <div>\n            <div class="gallery-main"><img id="gallery-main-img" src="${p.image}" alt="${p.name}"></div>\n            <div class="gallery-thumbs" id="gallery-thumbs">\n              ${gallery.map((src,i)=>`\n                <button class="${i===0?"active":""}" data-src="${src}">\n                  <img src="${src}" alt="">\n                </button>`).join("")}\n            </div>\n          </div>\n          <div class="detail-info">\n            <span class="product-category">${p.category}</span>\n            <h1>${p.name}</h1>\n            <div class="detail-meta">\n              <span class="stars">${starString(p.rating)}</span>\n              <span style="color: var(--color-text-muted);">${p.rating} · ${p.reviews||0} reviews</span>\n              <span style="color: var(--color-success); font-weight: 600;">● In stock</span>\n            </div>\n            <div class="detail-prices">\n              <span class="price-now">${formatMoney(p.price)}</span>\n              ${p.oldPrice?`<span class="price-old">${formatMoney(p.oldPrice)}</span>\n                <span class="discount">Save ${disc}%</span>`:""}\n            </div>\n            <p class="detail-description">${p.description}</p>\n\n            <div class="qty-row">\n              <div class="qty">\n                <button id="qty-dec" aria-label="Decrease">−</button>\n                <input id="qty-input" type="text" value="1" aria-label="Quantity">\n                <button id="qty-inc" aria-label="Increase">+</button>\n              </div>\n              <button class="product-fav ${inWishlist(p.id)?"active":""}" id="fav-btn" style="position:static; width:46px; height:46px;" aria-label="Wishlist">\n                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>\n              </button>\n            </div>\n\n            <div class="detail-cta">\n              <button class="btn btn-primary" id="add-cart-btn">🛒 Add to Cart</button>\n              <button class="btn btn-accent" id="buy-now-btn">⚡ Buy Now</button>\n            </div>\n\n            <h3 style="margin: 8px 0 14px;">Specifications</h3>\n            <table class="specs-table"><tbody>${specRows}</tbody></table>\n          </div>\n        </div>\n      `;document.getElementById("gallery-thumbs").addEventListener("click",e=>{const btn=e.target.closest("button");if(!btn)return;document.querySelectorAll("#gallery-thumbs button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");document.getElementById("gallery-main-img").src=btn.dataset.src});const qtyInput=document.getElementById("qty-input");document.getElementById("qty-inc").onclick=()=>qtyInput.value=(parseInt(qtyInput.value)||1)+1;document.getElementById("qty-dec").onclick=()=>qtyInput.value=Math.max(1,(parseInt(qtyInput.value)||1)-1);qtyInput.addEventListener("input",()=>{const v=parseInt(qtyInput.value);qtyInput.value=!v||v<1?1:v});document.getElementById("add-cart-btn").onclick=()=>addToCart(p.id,parseInt(qtyInput.value)||1);document.getElementById("buy-now-btn").onclick=()=>{addToCart(p.id,parseInt(qtyInput.value)||1);setTimeout(()=>location.href="checkout.html",500)};document.getElementById("fav-btn").onclick=e=>{const active=toggleWishlist(p.id);e.currentTarget.classList.toggle("active",active)};document.getElementById("related-grid").innerHTML=relatedProducts(p.id,p.category).map(productCardHTML).join("")||'<p style="color: var(--color-text-muted);">No related items found.</p>'})</script></body></html>
