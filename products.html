x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg> Filters</button></div><div class="products-layout"><aside class="filter-panel" id="filter-panel"><div class="filter-group"><h3>Category</h3><label><input type="radio" name="category" value="all" checked="checked"> All Products</label> <label><input type="radio" name="category" value="electronics"> Electronics</label> <label><input type="radio" name="category" value="fashion"> Fashion</label> <label><input type="radio" name="category" value="accessories"> Accessories</label> <label><input type="radio" name="category" value="home"> Home</label></div><div class="filter-group"><h3>Price Range</h3><label><input type="radio" name="price" value="all" checked="checked"> All</label> <label><input type="radio" name="price" value="0-50"> Under $50</label> <label><input type="radio" name="price" value="50-200"> $50 — $200</label> <label><input type="radio" name="price" value="200-500"> $200 — $500</label> <label><input type="radio" name="price" value="500-99999"> Over $500</label></div><div class="filter-group"><h3>Rating</h3><label><input type="radio" name="rating" value="0" checked="checked"> Any rating</label> <label><input type="radio" name="rating" value="4"> 4★ &amp; up</label> <label><input type="radio" name="rating" value="4.5"> 4.5★ &amp; up</label></div><button class="btn btn-ghost btn-block" id="reset-filters">Reset filters</button></aside><div><div id="result-meta" style="margin-bottom:12px;color:var(--color-text-muted);font-size:.9rem"></div><div class="product-grid" id="products-grid"></div></div></div></div></section></main><footer class="site-footer"></footer><script src="js/products.js"></script><script src="js/app.js"></script><script>document.addEventListener("DOMContentLoaded",()=>{const grid=document.getElementById("products-grid");const meta=document.getElementById("result-meta");const searchInput=document.getElementById("search-input");const sortSelect=document.getElementById("sort-select");const filterPanel=document.getElementById("filter-panel");const params=new URLSearchParams(location.search);const urlCat=params.get("category");if(urlCat){const radio=filterPanel.querySelector(`input[name="category"][value="${urlCat}"]`);if(radio){radio.checked=true}const c=CATEGORIES.find(c=>c.id===urlCat);if(c){document.getElementById("page-title").textContent=c.name;document.getElementById("page-sub").textContent=c.desc}}function applyFilters(){const cat=filterPanel.querySelector('input[name="category"]:checked').value;const price=filterPanel.querySelector('input[name="price"]:checked').value;const rating=parseFloat(filterPanel.querySelector('input[name="rating"]:checked').value);const q=searchInput.value.trim().toLowerCase();const sort=sortSelect.value;let list=PRODUCTS.slice();if(cat!=="all")list=list.filter(p=>p.category===cat);if(price!=="all"){const[min,max]=price.split("-").map(Number);list=list.filter(p=>p.price>=min&&p.price<=max)}if(rating>0)list=list.filter(p=>p.rating>=rating);if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||p.description.toLowerCase().includes(q));if(sort==="price-asc")list.sort((a,b)=>a.price-b.price);if(sort==="price-desc")list.sort((a,b)=>b.price-a.price);if(sort==="rating")list.sort((a,b)=>b.rating-a.rating);meta.textContent=`Showing ${list.length} product${list.length===1?"":"s"}`;if(!list.length){grid.innerHTML=`\n            <div class="empty-state" style="grid-column: 1/-1;">\n              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\n              <h3>No products found</h3>\n              <p>Try adjusting your search or filters.</p>\n            </div>`}else{grid.innerHTML=list.map(productCardHTML).join("")}}filterPanel.querySelectorAll("input").forEach(i=>i.addEventListener("change",applyFilters));searchInput.addEventListener("input",applyFilters);sortSelect.addEventListener("change",applyFilters);document.getElementById("reset-filters").addEventListener("click",()=>{filterPanel.querySelectorAll('input[value="all"]').forEach(i=>i.checked=true);filterPanel.querySelector('input[name="rating"][value="0"]').checked=true;searchInput.value="";sortSelect.value="default";applyFilters()});document.getElementById("filter-toggle").addEventListener("click",()=>{filterPanel.classList.toggle("show")});applyFilters()})</script></body></html>
